<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Network | GitHub Edition</title>
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    
    <style>
        :root { --gold: #D4AF37; --bright: #FFD700; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background: #0b0b0d; }
        
        .overlay {
            position: absolute; top: 0; left: 0; z-index: 10;
            background: rgba(10, 10, 12, 0.9);
            padding: 20px 30px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold);
            color: white; pointer-events: none;
        }
        .overlay h1 { margin: 0; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
        .overlay p { margin: 5px 0 0; font-size: 12px; opacity: 0.7; letter-spacing: 1px; }

        .hq-core { width: 18px; height: 18px; background: #fff; border: 3px solid var(--gold); border-radius: 50%; box-shadow: 0 0 20px var(--bright); }
        .node { width: 10px; height: 10px; background: var(--gold); border: 2px solid #fff; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>Netzwerk</h1>
        <p>International - National - Regional</p>
    </div>
    <div id="map"></div>

    <script>
        // Dein Token bleibt unverändert
        mapboxgl.accessToken = 'pk.eyJ1IjoiZGlldW1zYXR6bG9lc3VuZyIsImEiOiJjbW5ieGRoOHQxMGVqMm9wYnJ6MHdndGxzIn0.cjwQqgFatqE_-N-RYO6sbQ';

        const hq = [7.1901, 50.6747]; 
        const spots = [
            { n: "Düsseldorf", c: [6.7735, 51.2277] },
            { n: "Köln", c: [6.9583, 50.9375] },
            { n: "Berlin", c: [13.4050, 52.5200] },
            { n: "München", c: [11.5820, 48.1351] },
            { n: "Villingen-Schwenningen", c: [8.4580, 48.0601] },
            { n: "Utrecht (NL)", c: [5.1214, 52.0907] },
            { n: "Rotterdam (NL)", c: [4.4777, 51.9225] },
            { n: "Verona (IT)", c: [10.9916, 45.4384] },
            { n: "San Marino", c: [12.4483, 43.9320] },
            { n: "Novo Gorica (SI)", c: [13.6464, 45.9550] },
            { n: "Warschau (PL)", c: [21.0122, 52.2297] },
            { n: "Zagreb (HR)", c: [15.9819, 45.8150] }, 
            { n: "Tirana (AL)", c: [19.8187, 41.3275] }
        ];

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v10',
            center: [12, 45],
            zoom: 3.5,
            renderWorldCopies: false // Verbessert Performance auf Mobilgeräten
        });

        map.on('load', () => {
            map.flyTo({ center: [11.5, 47.5], zoom: 4.5, speed: 0.5 });

            // Basis setzen
            new mapboxgl.Marker(Object.assign(document.createElement('div'), {className: 'hq-core'})).setLngLat(hq).addTo(map);

            spots.forEach((s, i) => {
                new mapboxgl.Marker(Object.assign(document.createElement('div'), {className: 'node'})).setLngLat(s.c).addTo(map);

                const id = `s-${i}`;
                map.addSource(id, { 'type': 'geojson', 'data': { 'type': 'Feature', 'geometry': { 'type': 'LineString', 'coordinates': [hq, s.c] }}});

                map.addLayer({ 'id': `b-${i}`, 'type': 'line', 'source': id, 'paint': { 'line-color': '#D4AF37', 'line-width': 1.5, 'line-opacity': 0.2 }});
                map.addLayer({ 'id': `g-${i}`, 'type': 'line', 'source': id, 'paint': { 'line-color': '#FFD700', 'line-width': 8, 'line-opacity': 0.5, 'line-blur': 15, 'line-dasharray': [1, 100] }});
                map.addLayer({ 'id': `c-${i}`, 'type': 'line', 'source': id, 'paint': { 'line-color': '#FFF', 'line-width': 3, 'line-opacity': 1, 'line-dasharray': [1, 100] }});

                let phase = 0;
                let fw = true;
                function step() {
                    phase += 0.2;
                    if (phase >= 110) { phase = 0; fw = !fw; }
                    if (map.getLayer(`c-${i}`)) {
                        let cur = fw ? phase : (110 - phase);
                        map.setPaintProperty(`g-${i}`, 'line-dasharray', [0.01, cur, 15, 110 - cur]);
                        map.setPaintProperty(`c-${i}`, 'line-dasharray', [0.01, cur, 8, 110 - cur]);
                        requestAnimationFrame(step);
                    }
                }
                step();
            });
        });
    </script>
</body>
</html>
